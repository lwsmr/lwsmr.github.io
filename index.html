<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>low summer · 로우썸머 매거진</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }

    body {
      min-height: 100vh;
      background: radial-gradient(135% 95% at 50% 32%, #ffffff 0%, #f7faf7 18%, #ecf4ee 44%, #dfeee6 68%, #e9f1ec 100%);
      font-family: 'Gowun Batang', 'Cormorant', serif;
      color: #4a4640;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(250,248,241,0.5) 0%,
        rgba(249,250,245,0.04) 28%,
        rgba(223,234,228,0) 62%,
        rgba(220,234,227,0.28) 100%);
    }

    .container {
      max-width: 470px;
      margin: 0 auto;
      padding: 30px 26px 56px;
      position: relative;
      z-index: 1;
    }

    /* ── Views ── */
    .view { animation: fadeUp 0.55s ease both; }
    .view.hidden { display: none; }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }
    .avatar-ring {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      padding: 7px;
      border: 2.5px dotted #ffffff;
      animation: float 7s ease-in-out infinite;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #ffffff;
      box-shadow: 0 6px 20px rgba(74,70,64,0.18);
      background: radial-gradient(120% 120% at 50% 38%, #ffffff 0%, #f1f7f2 55%, #e3efe8 100%);
    }
    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.18);
      filter: saturate(0.96);
    }

    /* ── Wordmark ── */
    .wordmark {
      text-align: center;
      font-family: 'Cormorant', serif;
      font-weight: 500;
      font-size: 62px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      color: #46423b;
    }

    /* ── Korean name + handle ── */
    .kr-block {
      text-align: center;
      margin-top: 10px;
    }
    .kr-name {
      font-family: 'Gowun Batang', serif;
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0.22em;
      color: #6a655c;
    }
    .handle-link {
      display: inline-block;
      margin-top: 12px;
      font-family: 'Cormorant', serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      color: #84aa9e;
      text-decoration: none;
      padding: 4px 15px;
      border: 1px solid #84aa9e;
      border-radius: 20px;
      transition: background 0.2s ease;
    }
    .handle-link:hover { background: rgba(132,170,158,0.1); }

    /* ── Tagline ── */
    .tagline {
      text-align: center;
      font-family: 'Gowun Batang', serif;
      font-size: 11px;
      color: #a59c8c;
      letter-spacing: 0.02em;
      margin-top: 20px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      margin: 26px 6px 22px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: repeating-linear-gradient(90deg, #84aa9e 0 3px, transparent 3px 8px);
      opacity: 0.55;
    }

    /* ── Link stack ── */
    .link-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(244,248,245,0.6);
      border: 1px solid rgba(221,233,227,0.72);
      border-radius: 16px;
      padding: 11px 14px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      text-decoration: none;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      text-align: left;
      width: 100%;
    }
    .link-stack > .link-card:nth-child(1) { transform: rotate(-0.5deg); }
    .link-stack > .link-card:nth-child(2) { transform: rotate(0.5deg); }
    .link-stack > .link-card:nth-child(3) { transform: rotate(-0.4deg); }
    .link-stack > .link-card:nth-child(4) { transform: rotate(-0.4deg); }
    .link-stack > .link-card:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 0 8px 22px rgba(74,70,64,0.13);
      border-color: #84aa9e;
    }

    .link-thumb {
      width: 58px;
      height: 58px;
      border-radius: 11px;
      overflow: hidden;
      flex: none;
      border: 1px solid #e6ddcc;
    }
    .link-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .link-body { flex: 1; min-width: 0; }
    .link-kicker {
      font-family: 'Cormorant', serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #84aa9e;
    }
    .link-title {
      font-size: 16.5px;
      color: #4a4640;
      margin-top: 1px;
    }
    .link-sub {
      font-size: 12px;
      color: #a39a8a;
      margin-top: 2px;
    }
    .link-sub.serif {
      font-family: 'Cormorant', serif;
      letter-spacing: 0.05em;
    }
    .link-chevron { flex: none; }

    /* ── Home footer ── */
    .home-footer { margin-top: 34px; }
    .footer-wave {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #84aa9e;
      opacity: 0.7;
    }
    .footer-copy {
      text-align: center;
      font-family: 'Cormorant', serif;
      font-size: 12.5px;
      letter-spacing: 0.06em;
      color: #a89e8d;
      margin-top: 10px;
    }

    /* ── Sub-page ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #8b8474;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      margin-bottom: 22px;
    }
    .back-btn-label {
      font-family: 'Cormorant', serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .coll-kicker {
      text-align: center;
      font-family: 'Cormorant', serif;
      font-size: 29px;
      line-height: 0.9;
      color: #84aa9e;
      margin-bottom: 6px;
    }
    .coll-title {
      text-align: center;
      font-family: 'Gowun Batang', serif;
      font-weight: 700;
      font-size: 27px;
      letter-spacing: 0.14em;
      color: #46423b;
      margin: 6px 0 14px;
    }
    .coll-intro {
      text-align: center;
      font-size: 13.5px;
      line-height: 1.8;
      color: #757065;
      max-width: 340px;
      margin: 0 auto 24px;
    }

    /* ── Product grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 16px;
    }
    .product-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease;
    }
    .product-card:hover { transform: translateY(-4px); }
    .product-img {
      aspect-ratio: 4 / 5;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(221,233,227,0.72);
      background-color: #efe9db;
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 14px rgba(74,70,64,0.10);
      filter: saturate(0.95);
    }
    .product-info {
      margin-top: 9px;
      padding: 0 1px;
    }
    .product-name {
      font-size: 14.5px;
      color: #4a4640;
      line-height: 1.35;
    }
    .product-brand {
      font-family: 'Gowun Batang', serif;
      font-size: 11.5px;
      letter-spacing: 0.02em;
      color: #a39a8a;
      margin-top: 3px;
    }

    .sub-back-footer {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
      margin-top: 34px;
      font-family: 'Cormorant', serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #84aa9e;
      padding: 0;
    }
    .sub-copy {
      text-align: center;
      font-family: 'Cormorant', serif;
      font-size: 12px;
      color: #a89e8d;
      margin-top: 14px;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ════════ HOME ════════ -->
  <div id="view-home" class="view">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <img src="assets/logo.jpg" alt="low summer" class="avatar-img">
        </div>
      </div>
    </div>

    <!-- Wordmark -->
    <div class="wordmark">low summer</div>

    <!-- Korean name + handle -->
    <div class="kr-block">
      <div class="kr-name">로우썸머 매거진</div>
      <a href="https://instagram.com/lwsmr.mag" target="_blank" rel="noopener" class="handle-link">@lwsmr.mag</a>
    </div>

    <!-- Disclaimer -->
    <div class="tagline">리워드성 링크가 포함되어 있을 수 있습니다</div>

    <!-- Divider -->
    <div class="divider"><div class="divider-line"></div></div>

    <!-- Link cards -->
    <div class="link-stack">

      <button class="link-card" onclick="showCollection('pick')">
        <div class="link-thumb"><img src="assets/cover1.JPG" alt="빈티지 살안타템"></div>
        <div class="link-body">
          <div class="link-kicker">fashion</div>
          <div class="link-title">빈티지 살안타템</div>
          <div class="link-sub">더 늦기 전에 챙겨보기</div>
        </div>
        <svg class="link-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#84aa9e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>

      <button class="link-card" onclick="showCollection('grownup')">
        <div class="link-thumb"><img src="assets/cover2.JPG" alt="어른여자 아이템 모음"></div>
        <div class="link-body">
          <div class="link-kicker">fashion</div>
          <div class="link-title">어른여자 아이템 모음</div>
          <div class="link-sub">흐르는 실루엣으로 완성하는 여름 코디</div>
        </div>
        <svg class="link-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#84aa9e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>

      <a href="mailto:lwsmr.mag@gmail.com" class="link-card">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6a655c" stroke-width="1.5" style="flex:none"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M4 7l8 6 8-6"/></svg>
        <div class="link-body">
          <div class="link-title">협업 · 문의</div>
          <div class="link-sub serif">contact &amp; collab</div>
        </div>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#b3a995" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </a>

    </div>

    <!-- Footer -->
    <div class="home-footer">
      <div class="footer-wave">
        <svg width="34" height="14" viewBox="0 0 60 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 12C8 4 16 4 20 12s12 8 14 0 11-7 16-1"/>
        </svg>
      </div>
      <div class="footer-copy">© 2026 low summer</div>
    </div>

  </div><!-- /view-home -->


  <!-- ════════ COLLECTION ════════ -->
  <div id="view-collection" class="view hidden">

    <button class="back-btn" onclick="showHome()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#84aa9e" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      <span class="back-btn-label">back to low summer</span>
    </button>

    <div class="coll-kicker" id="coll-kicker"></div>
    <h1 class="coll-title" id="coll-title"></h1>
    <p class="coll-intro" id="coll-intro"></p>

    <div class="product-grid" id="product-grid"></div>

    <button class="sub-back-footer" onclick="showHome()">← back to all links</button>
    <div class="sub-copy">© 2026 low summer</div>

  </div><!-- /view-collection -->

</div><!-- /container -->

<script>
  const COLLECTIONS = {
    pick: {
      kicker: 'fashion',
      title: '빈티지 살안타템',
      intro: '사진을 누르면 구매처로 이동해요.',
      products: [
        { img: 'assets/item1.JPG', name: '모리츠 린넨 가디건',                    brand: '모래하우스', url: 'https://s.zigzag.kr/abr/jUbjbdbcqs' },
        { img: 'assets/item2.JPG', name: '아일 웨이비 볼레로',                    brand: '모래하우스', url: 'https://s.zigzag.kr/abr/fVuoYOC41v' },
        { img: 'assets/item3.JPG', name: 'tie scarf CD',                          brand: '김아홉',     url: 'https://s.zigzag.kr/abr/Zj3WUgyb2Q' },
        { img: 'assets/item4.JPG', name: 'bright pintuck cardigan',              brand: '김아홉',     url: 'https://s.zigzag.kr/abr/LuqIOFDxGO' },
        { img: 'assets/item5.JPG', name: '료카 썸머 레이어드 브이넥 랩 후드 니트', brand: '바온',       url: 'https://s.zigzag.kr/abr/sYBtDQnrOy' },
        { img: 'assets/item6.JPG', name: '랑비 페이즐리 바람막이',                brand: '미리내로',   url: 'https://s.zigzag.kr/abr/sRKXldIVHH' },
        { img: 'assets/item7.JPG', name: '페스츄리 가디건',                       brand: '오운마인드', url: 'https://s.zigzag.kr/abr/mW9ROyuJtl' },
        { img: 'assets/item8.JPG', name: '히피 패턴 시스루 후드 여름가디건',       brand: '신시',       url: 'https://s.zigzag.kr/abr/8YnFJEqoFp' }
      ]
    },
    grownup: {
      kicker: 'fashion',
      title: '어른여자 아이템 모음',
      intro: '사진을 누르면 구매처로 이동해요.',
      products: [
        { img: 'assets/item9.JPG',  name: 'pleats mock-neck blouse (3colors)',                  brand: '에프터먼데이', url: 'https://s.zigzag.kr/abr/6bzUyucUPP' },
        { img: 'assets/item10.JPG', name: 'pour halter bl',                                     brand: '베이비랩',     url: 'https://s.zigzag.kr/abr/sLW7ooC6mW' },
        { img: 'assets/item11.JPG', name: 'Blaire Tee (2colors)',                               brand: '메이비베이비', url: 'https://s.zigzag.kr/abr/Pc08pgEG1w' },
        { img: 'assets/item12.JPG', name: '[허리끈!청순]홀터넥 리본 타이 랩 나시 블라우스 미니 원피스', brand: '더멋',         url: 'https://s.zigzag.kr/abr/SU8zZCuyDC' },
        { img: 'assets/item13.JPG', name: '[라룸] [by LAROOM] 노아썸머슬랙스',                              brand: '라룸',       url: 'https://s.zigzag.kr/abr/WrZ83CfRvT' },
        { img: 'assets/item14.JPG', name: 'serene skirt',                                                  brand: '세이지블루', url: 'https://s.zigzag.kr/abr/fmxaAxgTI4' },
        { img: 'assets/item15.JPG', name: '[플라워자가드/맥시롱] Floral jacquard satin maxi skirt (Ivory, black)', brand: '노비야카',   url: 'https://s.zigzag.kr/abr/00uCDLcK7W' },
        { img: 'assets/item16.JPG', name: '[5th] [page] 베일 시어 스카프 (2color)┃차콜 오늘출발',          brand: '킨다베이지', url: 'https://s.zigzag.kr/abr/eI9H0sTDtk' }
      ]
    }
  };

  function triggerAnim(el) {
    el.style.animation = 'none';
    el.offsetHeight; // force reflow
    el.style.animation = '';
  }

  function showHome() {
    const home = document.getElementById('view-home');
    const coll = document.getElementById('view-collection');
    coll.classList.add('hidden');
    home.classList.remove('hidden');
    triggerAnim(home);
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
  }

  function showCollection(key) {
    const data = COLLECTIONS[key];
    if (!data) return;

    document.getElementById('coll-kicker').textContent = data.kicker;
    document.getElementById('coll-title').textContent  = data.title;
    document.getElementById('coll-intro').textContent  = data.intro;

    const grid = document.getElementById('product-grid');
    grid.innerHTML = data.products.map(p => {
      const safeUrl = p.url.replace(/"/g, '&quot;');
      const safeImg = p.img.replace(/"/g, '&quot;');
      const safeName = p.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const safeBrand = p.brand.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      return `<a href="${safeUrl}" target="_blank" rel="noopener" class="product-card">
        <div class="product-img" style="background-image:url('${safeImg}')"></div>
        <div class="product-info">
          <div class="product-name">${safeName}</div>
          <div class="product-brand">${safeBrand}</div>
        </div>
      </a>`;
    }).join('');

    const home = document.getElementById('view-home');
    const coll = document.getElementById('view-collection');
    home.classList.add('hidden');
    coll.classList.remove('hidden');
    triggerAnim(coll);
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
  }

  // Keyboard support for button-role elements
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.getAttribute('role') === 'button') {
      e.target.click();
    }
  });
</script>
</body>
</html>
